<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>面试日程 · 邓泽霖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#2563eb;
  --green:#22c55e;--green-bg:#22c55e20;
  --yellow:#eab308;--yellow-bg:#eab30820;
  --red:#ef4444;--red-bg:#ef444420;
  --blue:#3b82f6;--blue-bg:#3b82f620;
  --radius:12px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 80px}
@media(min-width:640px){body{padding:40px 24px 80px}}

.header{text-align:center;margin-bottom:40px}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.header p{color:var(--text2);font-size:.875rem}

.stats{display:flex;gap:12px;margin-bottom:32px;justify-content:center;flex-wrap:wrap}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:80px}
.stat .num{font-size:1.75rem;font-weight:700;line-height:1.2}
.stat .label{font-size:.75rem;color:var(--text2);margin-top:4px}
.stat.total .num{color:var(--text)}
.stat.upcoming .num{color:var(--yellow)}
.stat.done .num{color:var(--green)}

.timeline{max-width:560px;margin:0 auto;position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--surface2);border-radius:1px}

.day-group{margin-bottom:28px}
.day-label{font-size:.75rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.day-label::after{content:'';flex:1;height:1px;background:var(--surface2)}
.day-label.today{color:var(--yellow)}

.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;border-left:3px solid var(--surface2);transition:border-color .2s,transform .15s}
.card:hover{transform:translateX(4px)}
.card::before{content:'';position:absolute;left:-37px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--surface2)}
.card.upcoming{border-left-color:var(--yellow)}
.card.upcoming::before{border-color:var(--yellow);background:var(--yellow)}
.card.done{border-left-color:var(--green)}
.card.done::before{border-color:var(--green);background:var(--green)}
.card.passed{border-left-color:var(--text3);opacity:.5}
.card.passed::before{border-color:var(--text3)}

.card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.company{font-size:1.1rem;font-weight:600}
.time{font-size:.875rem;color:var(--text2);margin-left:auto;font-variant-numeric:tabular-nums}
.badge{font-size:.625rem;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.03em}
.badge.upcoming{background:var(--yellow-bg);color:var(--yellow)}
.badge.done{background:var(--green-bg);color:var(--green)}
.badge.passed{background:var(--red-bg);color:var(--red)}

.countdown{font-size:.8rem;color:var(--text3);margin-top:6px}
.countdown b{color:var(--yellow);font-weight:600}

.empty{text-align:center;color:var(--text3);padding:48px 16px;font-size:.9rem}

@media(max-width:480px){
  .card{padding:16px}
  .company{font-size:1rem}
  .stats{gap:8px}
  .stat{padding:12px 16px}
  .stat .num{font-size:1.25rem}
  .timeline{padding-left:28px}
  .card::before{left:-33px;width:10px;height:10px}
}
</style>
</head>
<body>

<div class="header">
  <h1>面试日程</h1>
  <p id="clock"></p>
</div>

<div class="stats" id="stats"></div>
<div class="timeline" id="timeline"></div>

<script>
const INTERVIEWS = [
  { company: 'xx觉醒',   date: '2026-05-29', time: '15:00', status: 'upcoming' },
  { company: 'qiji',     date: '2026-05-29', time: '17:00', status: 'upcoming' },
  { company: '拼多多',   date: '2026-06-02', time: '14:00', status: 'upcoming' },
  { company: 'honghu出行', date: '2026-06-03', time: '11:00', status: 'upcoming' },
];

function render() {
  const now = new Date();
  const today = now.toISOString().slice(0,10);

  // clock
  document.getElementById('clock').textContent =
    now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}) +
    ' ' + now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  // stats
  const upcoming = INTERVIEWS.filter(i => i.status==='upcoming');
  const done = INTERVIEWS.filter(i => i.status==='done');
  document.getElementById('stats').innerHTML = `
    <div class="stat total"><div class="num">${INTERVIEWS.length}</div><div class="label">全部</div></div>
    <div class="stat upcoming"><div class="num">${upcoming.length}</div><div class="label">待面</div></div>
    <div class="stat done"><div class="num">${done.length}</div><div class="label">已面</div></div>
  `;

  // group by date
  const groups = {};
  INTERVIEWS.forEach(i => {
    if (!groups[i.date]) groups[i.date] = [];
    groups[i.date].push(i);
  });

  const dates = Object.keys(groups).sort();
  const tl = document.getElementById('timeline');
  let html = '';

  dates.forEach(date => {
    const d = new Date(date + 'T00:00:00');
    const label = d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    const isToday = date === today;
    html += `<div class="day-group"><div class="day-label${isToday?' today':''}">${isToday?'今天 · ':''}${label}</div>`;

    groups[date].forEach(iv => {
      const dt = new Date(iv.date + 'T' + iv.time);
      const diff = dt - now;
      let countdownHtml = '';
      let cardStatus = iv.status;

      if (iv.status === 'upcoming' && diff < 0) {
        cardStatus = 'passed';
        countdownHtml = '<div class="countdown">已过时</div>';
      } else if (iv.status === 'upcoming' && diff > 0) {
        const hrs = Math.floor(diff/3600000);
        const mins = Math.floor((diff%3600000)/60000);
        if (hrs >= 24) {
          const days = Math.floor(hrs/24);
          countdownHtml = `<div class="countdown"><b>${days}</b> 天后</div>`;
        } else if (hrs > 0) {
          countdownHtml = `<div class="countdown"><b>${hrs}</b> 小时 <b>${mins}</b> 分钟后</div>`;
        } else {
          countdownHtml = `<div class="countdown"><b>${mins}</b> 分钟后</div>`;
        }
      }

      const badgeText = cardStatus==='done'?'已面':cardStatus==='passed'?'已过':'待面';

      html += `
        <div class="card ${cardStatus}">
          <div class="card-top">
            <span class="company">${iv.company}</span>
            <span class="badge ${cardStatus}">${badgeText}</span>
            <span class="time">${iv.time}</span>
          </div>
          ${countdownHtml}
        </div>`;
    });
    html += '</div>';
  });

  tl.innerHTML = html;
}

render();
setInterval(render, 30000);
</script>
</body>
</html>
