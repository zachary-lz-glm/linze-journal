<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>面试日程 · 邓泽霖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--green-bg:#22c55e20;
  --yellow:#eab308;--yellow-bg:#eab30820;
  --red:#ef4444;--red-bg:#ef444420;
  --radius:12px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 80px}
@media(min-width:640px){body{padding:40px 24px 80px}}

.header{text-align:center;margin-bottom:40px}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.header p{color:var(--text2);font-size:.875rem}

.stats{display:flex;gap:12px;margin-bottom:32px;justify-content:center;flex-wrap:wrap}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:80px}
.stat .num{font-size:1.75rem;font-weight:700;line-height:1.2}
.stat .label{font-size:.75rem;color:var(--text2);margin-top:4px}
.stat.total .num{color:var(--text)}
.stat.upcoming .num{color:var(--yellow)}
.stat.done .num{color:var(--green)}

.timeline{max-width:560px;margin:0 auto;position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--surface2);border-radius:1px}

.day-group{margin-bottom:28px}
.day-label{font-size:.75rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.day-label::after{content:'';flex:1;height:1px;background:var(--surface2)}
.day-label.today{color:var(--yellow)}

.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;border-left:3px solid var(--surface2);transition:all .2s}
.card:hover{transform:translateX(4px)}
.card::before{content:'';position:absolute;left:-37px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--surface2)}
.card[data-s="upcoming"]{border-left-color:var(--yellow)}
.card[data-s="upcoming"]::before{border-color:var(--yellow);background:var(--yellow)}
.card[data-s="done"]{border-left-color:var(--green)}
.card[data-s="done"]::before{border-color:var(--green);background:var(--green)}
.card[data-s="finished"]{border-left-color:var(--text3);opacity:.55}
.card[data-s="finished"]::before{border-color:var(--text3)}
.card[data-s="ongoing"]{border-left-color:var(--red)}
.card[data-s="ongoing"]::before{border-color:var(--red);background:var(--red);animation:pulse 1.5s ease infinite}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ef444480}50%{box-shadow:0 0 0 6px #ef444400}}

.card-top{display:flex;align-items:center;gap:10px}
.company{font-size:1.1rem;font-weight:600}
.time{font-size:.875rem;color:var(--text2);margin-left:auto;font-variant-numeric:tabular-nums}
.badge{font-size:.625rem;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.03em;cursor:pointer;transition:transform .1s}
.badge:active{transform:scale(.92)}
.badge.upcoming{background:var(--yellow-bg);color:var(--yellow)}
.badge.done{background:var(--green-bg);color:var(--green)}
.badge.finished{background:var(--red-bg);color:var(--red)}
.badge.ongoing{background:var(--red-bg);color:var(--red)}

.meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.countdown{font-size:.8rem;color:var(--text3)}
.countdown b{color:var(--yellow);font-weight:600}
.hint{font-size:.7rem;color:var(--text3);opacity:.6}

@media(max-width:480px){
  .card{padding:16px}
  .company{font-size:1rem}
  .stats{gap:8px}
  .stat{padding:12px 16px}
  .stat .num{font-size:1.25rem}
  .timeline{padding-left:28px}
  .card::before{left:-33px;width:10px;height:10px}
}
</style>
</head>
<body>

<div class="header">
  <h1>面试日程</h1>
  <p id="clock"></p>
</div>

<div class="stats" id="stats"></div>
<div class="timeline" id="timeline"></div>

<script>
const KEY = 'iv_status';
const INTERVIEWS = [
  { id:'xxjx',  company:'xx觉醒',    date:'2026-05-29', time:'15:00' },
  { id:'qiji',  company:'qiji',      date:'2026-05-29', time:'17:00' },
  { id:'pdd',   company:'拼多多',    date:'2026-06-02', time:'14:00' },
  { id:'hhcx',  company:'honghu出行', date:'2026-06-03', time:'11:00' },
];

function loadStatus(){
  try{ return JSON.parse(localStorage.getItem(KEY))||{} }catch(e){ return {} }
}
function saveStatus(s){ localStorage.setItem(KEY, JSON.stringify(s)) }
function setStatus(id, s){ const st=loadStatus(); st[id]=s; saveStatus(st) }

function getStatus(iv, now){
  const saved = loadStatus()[iv.id];
  if(saved==='done') return 'done';
  const dt = new Date(iv.date+'T'+iv.time);
  const diff = dt - now;
  if(diff > 0) return 'upcoming';
  const minsPassed = (now - dt) / 60000;
  if(minsPassed < 90) return 'ongoing';
  return 'finished';
}

function render(){
  const now = new Date();
  const today = now.toISOString().slice(0,10);

  document.getElementById('clock').textContent =
    now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}) +
    ' ' + now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  const statuses = INTERVIEWS.map(iv => ({...iv, s: getStatus(iv, now)}));
  const up = statuses.filter(x=>x.s==='upcoming'||x.s==='ongoing').length;
  const dn = statuses.filter(x=>x.s==='done').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat total"><div class="num">${INTERVIEWS.length}</div><div class="label">全部</div></div>
    <div class="stat upcoming"><div class="num">${up}</div><div class="label">待面</div></div>
    <div class="stat done"><div class="num">${dn}</div><div class="label">已面</div></div>
  `;

  const groups = {};
  statuses.forEach(iv => { (groups[iv.date] = groups[iv.date]||[]).push(iv) });

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const d = new Date(date+'T00:00:00');
    const label = d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    const isToday = date===today;
    const isTomorrow = new Date(date+'T00:00:00').toDateString() === new Date(now.getTime()+86400000).toDateString();
    const prefix = isToday?'今天 · ':isTomorrow?'明天 · ':'';
    html += `<div class="day-group"><div class="day-label${isToday?' today':''}">${prefix}${label}</div>`;

    groups[date].forEach(iv => {
      const dt = new Date(iv.date+'T'+iv.time);
      const diff = dt - now;
      let countdownHtml = '';
      let hintHtml = '';

      if(iv.s==='ongoing'){
        const elapsed = Math.floor((now-dt)/60000);
        countdownHtml = `<div class="countdown" style="color:var(--red)">面试进行中（已 ${elapsed} 分钟）</div>`;
        hintHtml = `<span class="hint">点击标记已面</span>`;
      } else if(iv.s==='upcoming' && diff>0){
        const hrs=Math.floor(diff/3600000), mins=Math.floor((diff%3600000)/60000);
        if(hrs>=24) countdownHtml = `<div class="countdown"><b>${Math.floor(hrs/24)}</b> 天 <b>${hrs%24}</b> 小时后</div>`;
        else if(hrs>0) countdownHtml = `<div class="countdown"><b>${hrs}</b> 小时 <b>${mins}</b> 分钟后</div>`;
        else countdownHtml = `<div class="countdown"><b>${mins}</b> 分钟后</div>`;
      } else if(iv.s==='finished'){
        countdownHtml = `<div class="countdown">已结束</div>`;
        hintHtml = `<span class="hint">点击标记已面</span>`;
      } else if(iv.s==='done'){
        countdownHtml = `<div class="countdown" style="color:var(--green)">✓ 已完成</div>`;
      }

      const badgeText = {upcoming:'待面',ongoing:'进行中',finished:'已结束',done:'已面'}[iv.s];

      html += `
        <div class="card" data-s="${iv.s}" data-id="${iv.id}">
          <div class="card-top">
            <span class="company">${iv.company}</span>
            <span class="badge ${iv.s}" data-toggle="${iv.id}">${badgeText}</span>
            <span class="time">${iv.time}</span>
          </div>
          <div class="meta">
            ${countdownHtml}
            ${hintHtml}
          </div>
        </div>`;
    });
    html += '</div>';
  });

  document.getElementById('timeline').innerHTML = html;

  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      const id = el.dataset.toggle;
      const cur = loadStatus()[id];
      setStatus(id, cur==='done' ? 'upcoming' : 'done');
      render();
    };
  });
}

render();
setInterval(render, 15000);
</script>
</body>
</html>
