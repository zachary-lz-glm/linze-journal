<style>
  @page { size: A4; margin: 14mm 14mm; }
  * { box-sizing: border-box; }

  /* 覆盖 pandoc 默认 */
  header#title-block-header, h1.title, .title { display: none; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    font-size: 10.2pt;
    line-height: 1.55;
    color: #222;
    background: #fff;
    max-width: 42em;
    margin: 0 auto;
    padding: 40px 56px;
  }

  /* 头部:姓名 + 联系方式 + 头像 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 8px;
  }
  .header .info { flex: 1; }
  .header .photo {
    width: 78pt;
    height: 104pt;
    object-fit: cover;
    border-radius: 3px;
    border: 0.5px solid #ddd;
    margin: 0;
  }
  .header h1 {
    font-size: 22pt;
    margin: 0 0 3pt 0;
    color: #1a1a1a;
    letter-spacing: 0.5pt;
    font-weight: 700;
  }

  h2 {
    font-size: 11.5pt;
    color: #1A2B4A;
    border-bottom: 0.6pt solid #cccccc;
    padding-bottom: 2pt;
    margin: 12pt 0 5pt 0;
    font-weight: 700;
    letter-spacing: 0.3pt;
  }

  h3 {
    font-size: 11pt;
    margin: 9pt 0 2pt 0;
    color: #1a1a1a;
    font-weight: 700;
    padding-left: 6pt;
    border-left: 2.5pt solid #1A2B4A;
  }

  p { margin: 4px 0; }
  ul { margin: 4px 0 4px 0; padding-left: 18px; }
  li { margin: 2px 0; }

  /* 加粗 = Navy 加粗(技术词强调) */
  strong {
    color: #1A2B4A;
    font-weight: 700;
  }

  /* 项目副标题 = 9pt 灰 */
  em {
    color: #555;
    font-size: 9pt;
    font-style: normal;
    display: block;
    margin: 1px 0 3px 0;
  }

  a { color: #1A2B4A; text-decoration: none; }

  hr {
    border: none;
    border-top: 0.4pt solid #e0e0e0;
    margin: 8px 0;
  }

  h1 + p { font-size: 11pt; font-weight: 600; color: #1A2B4A; margin-bottom: 2px; }
  h1 + p + p { font-size: 9.2pt; color: #555; }

  h2, h3 { break-after: avoid; page-break-after: avoid; }
  li { break-inside: avoid; }

  @media print {
    body { padding: 0; max-width: none; font-size: 10.2pt; }
    .header .photo { width: 78pt; height: 104pt; }
  }
</style>
