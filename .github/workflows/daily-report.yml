name: AI 情报日报

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai    # 脚本中取日期为北京时间

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 生成 AI 情报日报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-daily-report.js

      - name: 提交并推送
        run: |
          git config user.name "AI Reporter"
          git config user.email "ai-reporter[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 auto: $(date +%Y-%m-%d) AI情报日报"
          git push
