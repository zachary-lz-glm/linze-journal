name: AI 情报周报

on:
  schedule:
    - cron: '0 2 * * 1'  # UTC 02:00 = 北京 10:00，每周一
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 生成周报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-weekly-report.js

      - name: 提交并推送
        run: |
          git config user.name "AI Reporter"
          git config user.email "ai-reporter[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 auto: $(date +%Y-W%V) AI工程化周报"
          git pull --rebase --strategy-option=theirs
          git push
